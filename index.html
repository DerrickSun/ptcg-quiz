<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>测测你该玩哪套</title>
  <style>
    :root{
      /* 手游活动页：清爽浅色 */
      --bg:#f6f8ff;
      --card:#ffffff;
      --card2:#f3f6ff;
      --text:#0f172a;
      --muted:#64748b;
      --accent:#2563eb;
      --accent2:#06b6d4;
      --danger:#e11d48;
      --border:#dbe3ff;
      --shadow: 0 10px 30px rgba(15,23,42,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
      font-size:16px;
      color:var(--text);
      background:
        radial-gradient(900px 520px at 18% 8%, rgba(37,99,235,.18) 0%, rgba(37,99,235,0) 55%),
        radial-gradient(800px 520px at 88% 22%, rgba(6,182,212,.14) 0%, rgba(6,182,212,0) 55%),
        radial-gradient(900px 620px at 40% 92%, rgba(99,102,241,.10) 0%, rgba(99,102,241,0) 55%),
        linear-gradient(180deg, #ffffff, var(--bg));
    }
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    .wrap{max-width:980px;margin:0 auto;padding:28px 18px 60px}
    .topbar{display:flex;gap:14px;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
    .title h1{font-size:22px;margin:0 0 6px}
    .title p{margin:0;color:var(--muted);line-height:1.4}
    .intro{
      margin-top:12px;
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      background:rgba(255,255,255,.72);
    }
    .intro .lead{font-size:14px;color:var(--muted);line-height:1.5}
    .pill{display:inline-flex;gap:8px;align-items:center;padding:8px 10px;border:1px solid var(--border);border-radius:999px;background:rgba(243,246,255,.9);color:var(--muted);font-size:12px}
    .grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}
    @media (max-width: 900px){.grid{grid-template-columns:1fr}}
    .card{background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(243,246,255,.96));border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
    .progress{height:10px;background:#eaf0ff;border:1px solid var(--border);border-radius:999px;overflow:hidden}
    .bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .25s ease}
    .qhead{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:10px}
    .qnum{color:var(--muted);font-size:12px}
    .qtext{font-size:18px;line-height:1.4;margin:8px 0 12px}
    .opts{display:grid;gap:10px}
    button.opt{
      text-align:left;cursor:pointer;border-radius:14px;border:1px solid var(--border);
      padding:12px 14px;background:rgba(255,255,255,.85);color:var(--text);line-height:1.35;
      transition:transform .05s ease, border-color .2s ease, background .2s ease;
    }
    button.opt:hover{border-color:#93c5fd;background:rgba(243,246,255,.95)}
    button.opt:active{transform:translateY(1px)}
    /* 中间选项降低一点存在感，鼓励选左右（仍保持可点、可读） */
    button.opt.neutral{opacity:.84}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .qhead .row{justify-content:flex-end;gap:8px}
    .btn{
      cursor:pointer;border-radius:12px;border:1px solid var(--border);
      padding:10px 12px;background:rgba(255,255,255,.85);color:var(--text)
    }
    .btn.big{padding:14px 16px;border-radius:14px;font-size:16px}
    .btn:hover{border-color:#93c5fd}
    .btn.primary{border-color:rgba(37,99,235,.55);background:rgba(37,99,235,.10)}
    .btn.danger{border-color:rgba(225,29,72,.35);background:rgba(225,29,72,.08)}
    .small{font-size:12px;color:var(--muted);line-height:1.5}
    .hidden{display:none !important}
    .kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
    .kpi .box{border:1px solid var(--border);border-radius:14px;padding:10px;background:rgba(9,14,26,.45)}
    .kpi .label{color:var(--muted);font-size:12px}
    .kpi .val{font-size:14px;margin-top:3px}
    .tag{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;border:1px solid var(--border);background:rgba(243,246,255,.9);font-size:12px;color:var(--muted);margin-right:6px;margin-top:6px}
    .result-title{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .result-title h2{margin:0;font-size:20px}
    .deckcard{margin-top:14px;border:1px solid var(--border);border-radius:16px;padding:14px;background:rgba(243,246,255,.72)}
    .deckname{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
    .deckname .cn{font-weight:700}
    .deckname .en{color:var(--muted)}
    .deckhero{display:flex;gap:12px;align-items:center}
    .deckimg{
      width:84px;height:84px;flex:0 0 84px;border-radius:14px;
      border:1px solid var(--border);background:rgba(255,255,255,.9);
      padding:10px;object-fit:contain;
    }
    .deckimg.small{width:56px;height:56px;flex-basis:56px;padding:8px;border-radius:12px}
    .why{margin:10px 0 0;padding-left:18px;color:var(--text);line-height:1.55}
    .why li{margin:6px 0}
    .alts{display:grid;gap:10px;margin-top:12px}
    .alts .alt{border:1px solid var(--border);border-radius:14px;padding:12px;background:rgba(243,246,255,.55)}
    .footer-note{margin-top:14px;padding:10px 12px;border-radius:12px;border:1px dashed rgba(37,99,235,.45);color:var(--muted);background:rgba(255,255,255,.65);line-height:1.55}
    .author{margin-top:10px;color:var(--muted);font-size:12px;text-align:right}
    .sharebox{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .sharepreview{margin-top:10px;border:1px solid var(--border);border-radius:14px;overflow:hidden;background:rgba(255,255,255,.7)}
    .sharepreview img{display:block;width:100%;height:auto}
    /* 微信内打开更稳：用弹层展示大图，方便长按保存/转发 */
    .modal{position:fixed;inset:0;z-index:50;background:rgba(15,23,42,.55);backdrop-filter:blur(6px);display:none}
    .modal.show{display:block}
    .modal-inner{max-width:980px;margin:0 auto;padding:16px;height:100%;display:flex;flex-direction:column}
    .modal-top{display:flex;align-items:center;justify-content:center;gap:10px}
    .modal-top .hint{color:#fff;font-size:12px;line-height:1.4}
    .modal-body{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 0}
    .modal-img{max-width:100%;max-height:100%;border-radius:14px;border:1px solid var(--border);background:#fff}

    @media (max-width: 520px){
      .wrap{padding:18px 12px 42px}
      body{font-size:17px}
      .title h1{font-size:20px}
      .title p{font-size:14px}
      .intro .lead{font-size:15px}
      .qtext{font-size:18px}
      .qnum{font-size:13px}
      button.opt{padding:12px 12px}
      button.opt{font-size:16px}
      .deckhero{gap:10px}
      .deckimg{width:72px;height:72px;flex-basis:72px}
      .deckimg.small{width:52px;height:52px;flex-basis:52px}
      .small{font-size:13px}
      .btn.big{padding:16px 16px;font-size:17px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>测测你该玩哪套</h1>
      </div>
    </div>
    <div class="author">by 牛油果</div>

    <div class="grid">
      <div class="card">
        <div class="progress" aria-label="进度条"><div class="bar" id="bar"></div></div>
        <div class="qhead">
          <div class="qnum" id="qnum">准备开始</div>
          <div class="row">
            <button class="btn" id="btnBack" type="button">上一步</button>
            <button class="btn danger" id="btnReset" type="button">重来</button>
          </div>
        </div>
        <div id="quiz">
          <div class="intro">
            <div class="lead">
              16道题（每题三选一），测出你的「风格画像」。<br/>
              然后从当前热门体系里，匹配一套更适合你的标准赛制卡组（BRS–SSP）。<br/>
              测完可一键生成结果图，微信里长按保存/转发。
            </div>
            <div class="row" style="margin-top:12px">
              <button class="btn primary big" id="btnStart" type="button">开始测试</button>
            </div>
          </div>
        </div>

        <div id="result" class="hidden">
          <div class="result-title">
            <h2>你的推荐卡组</h2>
            <div class="row">
              <button class="btn" id="btnSaveTop" type="button">保存图片</button>
              <button class="btn primary" id="btnRetake" type="button">再测一次</button>
            </div>
          </div>
          <div class="deckcard" id="bestCard"></div>
          <div class="deckcard">
            <div style="font-weight:700;margin-bottom:8px;">分享</div>
            <div class="sharebox">
              <button class="btn primary" id="btnOpenShare" type="button">保存图片</button>
              <button class="btn" id="btnMakeShare" type="button">重新生成</button>
            </div>
            <div class="small" style="margin-top:10px">
              微信内打开：点「保存图片」→ 弹出大图 → <b>长按图片</b>保存/转发（点图片可关闭）。
            </div>
            <div class="sharepreview hidden" id="sharePreviewWrap">
              <img id="sharePreview" alt="分享图预览" />
            </div>
            <div class="modal" id="shareModal" role="dialog" aria-modal="true" aria-label="分享图大图">
              <div class="modal-inner">
                <div class="modal-top">
                  <div class="hint">长按图片 → 保存/转发（点图片关闭）</div>
                </div>
                <div class="modal-body">
                  <img class="modal-img" id="shareModalImg" alt="分享图大图" />
                </div>
              </div>
            </div>
          </div>
          <div class="deckcard">
            <div style="font-weight:700;margin-bottom:8px;">备选推荐（Top 3 匹配）</div>
            <div class="alts" id="alts"></div>
          </div>
          <div class="footer-note">
            提示：结果是“性格画像→卡组匹配”的推荐，不是强度排名；不满意可「再测一次」。
          </div>
        </div>
      </div>

      <!-- 轻量版：去掉实时维度面板，把“训练家风格”集中放在结果页与分享图 -->
      <div id="kpis" class="hidden"></div>
    </div>
  </div>

  <script>
    // 维度：0-100
    const dims = [
      { key: "pace", name: "出手速度", low: "慢热", high: "神速" },
      { key: "complex", name: "线路感", low: "直来直去", high: "套路王" },
      { key: "risk", name: "搏命值", low: "稳健", high: "敢梭哈" },
      { key: "control", name: "控场欲", low: "硬碰硬", high: "爱控场" },
      { key: "patience", name: "续航力", low: "短线", high: "耐久战" },
    ];

    // Limitless（BRS–SSP，time=all）——原型：中文译名与标签可后续按你口径校验/调整
    const decks = [
      { id: 260, en: "Regidrago VSTAR", cn: "雷吉铎拉戈VSTAR", icon: "regidrago", tags: ["工具箱","高上限","线路多"],
        vec: { pace: 70, complex: 70, risk: 70, control: 45, patience: 60 },
        reason: "多路线工具箱：根据对局选择不同招式与线路，适合爱规划、临场应变强的人。" },
      { id: 264, en: "Charizard ex", cn: "喷火龙ex", icon: "charizard", tags: ["中速","稳定","强终结"],
        vec: { pace: 50, complex: 60, risk: 45, control: 40, patience: 55 },
        reason: "节奏稳定、容错高：前中期铺垫，后期火力强，适合“想稳又想赢得干净”的风格。" },
      { id: 255, en: "Gardevoir ex", cn: "沙奈朵ex", icon: "gardevoir", tags: ["长局","资源管理","操作细"],
        vec: { pace: 40, complex: 85, risk: 55, control: 55, patience: 85 },
        reason: "资源与顺序细节很多，常要算伤害与资源回收；耐心型玩家会越打越强。" },
      { id: 269, en: "Klawf Unhinged Scissors", cn: "毛崖蟹（失控剪刀）", icon: "klawf", tags: ["节奏","爆发","灵活单奖"],
        vec: { pace: 75, complex: 55, risk: 65, control: 35, patience: 40 },
        reason: "节奏快、抓窗口能力强；适合喜欢快速施压、敢在关键回合搏一把的人。" },
      { id: 247, en: "Lugia Archeops", cn: "洛奇亚/始祖大鸟", icon: "lugia", tags: ["展开","上限高","爆发"],
        vec: { pace: 65, complex: 65, risk: 70, control: 35, patience: 50 },
        reason: "成型后爆发强，但更吃展开与时机；适合喜欢“做成就翻盘”的打法。" },
      { id: 280, en: "Raging Bolt ex", cn: "猛雷鼓ex", icon: "raging-bolt", tags: ["快攻","直来直去","压血线"],
        vec: { pace: 90, complex: 40, risk: 60, control: 25, patience: 25 },
        reason: "开局就想打出节奏、迅速换取奖赏；适合急性子、偏进攻的人。" },
      { id: 259, en: "Snorlax Stall PGO", cn: "卡比兽消耗（Stall）", icon: "snorlax", tags: ["消耗","锁资源","超长局"],
        vec: { pace: 10, complex: 70, risk: 35, control: 95, patience: 95 },
        reason: "通过限制与消耗让对手逐步失去行动；适合非常有耐心、喜欢掌控节奏的人。" },
      { id: 292, en: "Terapagos ex", cn: "太乐巴戈斯ex（太晶龟）", icon: "terapagos", tags: ["中速","变招","稳中求胜"],
        vec: { pace: 55, complex: 60, risk: 45, control: 45, patience: 60 },
        reason: "玩法偏中速与适配：既能打正面也能调节线路，适合不想被单一思路限制的人。" },
      { id: 284, en: "Dragapult ex", cn: "多龙巴鲁托ex", icon: "dragapult", tags: ["节奏","点杀/铺伤","对局理解"],
        vec: { pace: 65, complex: 70, risk: 50, control: 55, patience: 60 },
        reason: "需要把握节奏与伤害分配；适合心细、喜欢“每回合都做正确事”的玩家。" },
      { id: 315, en: "Archaludon ex", cn: "铝钢龙ex", icon: "archaludon", tags: ["耐久","对抗快攻","慢速滚雪球"],
        vec: { pace: 40, complex: 60, risk: 40, control: 55, patience: 75 },
        reason: "偏防守与耐久，对位与资源节奏重要；适合稳健、愿意慢慢扩大优势的人。" },
      { id: 267, en: "Gholdengo ex", cn: "赛富豪ex", icon: "gholdengo", tags: ["爆发","手牌管理","组合"],
        vec: { pace: 60, complex: 75, risk: 65, control: 35, patience: 55 },
        reason: "靠资源转换打爆发，手牌与资源管理关键；适合喜欢“算牌/算线”的人。" },
      { id: 227, en: "Palkia VSTAR", cn: "帕路奇亚VSTAR", icon: "palkia", tags: ["中速","稳定","场面控制"],
        vec: { pace: 55, complex: 50, risk: 35, control: 60, patience: 65 },
        reason: "更偏稳健控场：节奏不快但很扎实，重视场面与资源的可控性。" },
      { id: 268, en: "Roaring Moon ex", cn: "轰鸣月ex", icon: "roaring-moon", tags: ["快攻","高压","换血取胜"],
        vec: { pace: 85, complex: 55, risk: 75, control: 30, patience: 30 },
        reason: "用高压节奏逼对手失误，但也更吃取舍；适合敢换血、追求压制的人。" },
      { id: 241, en: "Lost Zone Box", cn: "LTB", icon: "comfey", tags: ["超高操作","多分支","节奏"],
        // 注意：题目映射的“思考复杂度”上限大约在 80 左右，过高会导致命中次数≈0
        vec: { pace: 75, complex: 80, risk: 60, control: 55, patience: 65 },
        reason: "选择题很多：每回合都在做路线决策；适合享受高强度思考与微操的人。" },
      { id: 276, en: "Pidgeot Control", cn: "大比鸟控制", icon: "pidgeot", tags: ["控制","针对性强","读牌"],
        vec: { pace: 25, complex: 85, risk: 40, control: 90, patience: 85 },
        reason: "更像“解题”：通过限制与针对组件拆掉对手；适合喜欢把对手锁死的人。" },
      { id: 283, en: "Iron Thorns ex", cn: "铁荆棘ex", icon: "iron-thorns", tags: ["干扰","半控制","反展开"],
        vec: { pace: 45, complex: 60, risk: 45, control: 75, patience: 65 },
        reason: "通过干扰破坏对手展开；适合喜欢对抗、爱找对手别扭但又不想极端长局的人。" },
      { id: 257, en: "Miraidon ex", cn: "密勒顿ex", icon: "miraidon", tags: ["快攻","展开简单","打点直接"],
        vec: { pace: 85, complex: 35, risk: 55, control: 25, patience: 25 },
        reason: "展开直观，主打速度与打点；适合喜欢干脆利落、不想纠结太多的人。" },
    ];

    // 16 道三选题：4 个维度 × 每个 4 题（更像“性格测试”的生活场景题，不贴卡组/不贴打牌语境）
    // 中间项为了减少“全部选中间”的情况，会带轻微倾向（±0.25）；展示仍为整数。
    const questions = [
      // 社交/独处（E/I）
      { sec: "energy", text: "突然有半天自由时间，你更想？", opts: [
        { t: "约人见面/出去玩", axis: "ei", val: +1 },
        { t: "说不清（偏出门）", axis: "ei", val: +0.25 },
        { t: "一个人待着充电", axis: "ei", val: -1 },
      ]},
      { sec: "energy", text: "到了一个全是陌生人的聚会，你更像？", opts: [
        { t: "主动找话题/认识人", axis: "ei", val: +1 },
        { t: "看情况（偏观察）", axis: "ei", val: -0.25 },
        { t: "先观察，慢慢热", axis: "ei", val: -1 },
      ]},
      { sec: "energy", text: "你有个好消息时更可能？", opts: [
        { t: "立刻分享给别人", axis: "ei", val: +1 },
        { t: "不太确定（偏分享）", axis: "ei", val: +0.25 },
        { t: "先自己开心一会", axis: "ei", val: -1 },
      ]},
      { sec: "energy", text: "一天结束后你更想？", opts: [
        { t: "再约点活动/聊聊天", axis: "ei", val: +1 },
        { t: "随便（偏外放）", axis: "ei", val: +0.25 },
        { t: "安静独处/刷点自己的", axis: "ei", val: -1 },
      ]},

      // 细节/抽象（S/N）
      { sec: "observe", text: "别人讲一件事，你更容易先抓到？", opts: [
        { t: "细节和证据点", axis: "sn", val: -1 },
        { t: "说不准（偏重点）", axis: "sn", val: +0.25 },
        { t: "重点和走向", axis: "sn", val: +1 },
      ]},
      { sec: "observe", text: "学新东西你更常用？", opts: [
        { t: "照着范例先做", axis: "sn", val: -1 },
        { t: "随便试试（偏照做）", axis: "sn", val: -0.25 },
        { t: "先搞懂原理", axis: "sn", val: +1 },
      ]},
      { sec: "observe", text: "看到一个新点子，你更像？", opts: [
        { t: "先问能不能落地", axis: "sn", val: -1 },
        { t: "先放一边（偏落地）", axis: "sn", val: -0.25 },
        { t: "先脑补各种可能", axis: "sn", val: +1 },
      ]},
      { sec: "observe", text: "你更容易被哪种内容吸引？", opts: [
        { t: "能马上用的", axis: "sn", val: -1 },
        { t: "都行（偏脑洞）", axis: "sn", val: +0.25 },
        { t: "能启发想象的", axis: "sn", val: +1 },
      ]},

      // 理性/共情（T/F）
      { sec: "decide", text: "朋友来问建议，你更常先？", opts: [
        { t: "先分析利弊", axis: "tf", val: +1 },
        { t: "看情况（偏利弊）", axis: "tf", val: +0.25 },

    const sectionNames = { energy: "社交", observe: "思维", decide: "选择", life: "习惯" };
    function sectionProgress(i){
      const sec = questions[i]?.sec ?? "energy";
      let total = 0, before = 0;
      for (let k=0;k<questions.length;k++){
        if (questions[k].sec === sec) total++;
        if (k < i && questions[k].sec === sec) before++;
      }
      return { sec, secName: sectionNames[sec] ?? sec, pos: before + 1, total };
    }

    // --- 状态 ---
    let idx = -1;
    let answers = []; // 每题选择的 option index
    let score = initScore();

    // --- UI refs ---
    const $ = (id) => document.getElementById(id);
    const bar = $("bar");
    const qnum = $("qnum");
    const quiz = $("quiz");
    const result = $("result");
    const kpis = $("kpis");
    const btnStart = $("btnStart");
    const btnBack = $("btnBack");
    const btnReset = $("btnReset");
    const btnRetake = $("btnRetake");
    const btnReset2 = $("btnRetake");

    const shareModalImg = $("shareModalImg");

    function initScore(){
      const s = {};
      for (const d of dims) s[d.key] = 50; // 从中位数开始
      return s;
    }

    function clamp(v,min,max){return Math.max(min,Math.min(max,v))}

    function recalcScoreFromAnswers(){
      const ax = axesFromAnswers();
      score = roundScore(scoreFromAxes(ax));
      renderKpis();
    }

    function axesFromAnswers(){
      const a = { ei: 0, sn: 0, tf: 0, jp: 0 };
      const n = { ei: 0, sn: 0, tf: 0, jp: 0 };
      for (let i=0;i<answers.length;i++){
        const oi = answers[i];
        if (oi == null) continue;
        const opt = questions[i].opts[oi];
        if (!opt || !opt.axis) continue;
        a[opt.axis] += Number(opt.val);
        n[opt.axis] += 1;
      }
      for (const k of Object.keys(a)){
        a[k] = n[k] ? (a[k] / n[k]) : 0; // 归一化到 [-1, 1]
      }
      return a;
    }

    function scoreFromAxes(ax){
      // ax.ei: +1 更外放更爱互动；-1 更内向更爱独处
      // ax.sn: +1 更偏抽象/联想；-1 更偏具体/细节
      // ax.tf: +1 更偏理性/标准；-1 更偏感受/关系
      // ax.jp: +1 更偏计划/掌控；-1 更偏随性/弹性
      return {
        pace: clamp(50 + 16*ax.ei - 14*ax.jp + 6*ax.sn, 0, 100),
        complex: clamp(50 + 22*ax.sn + 6*ax.tf + 2*ax.jp, 0, 100),
        risk: clamp(50 - 16*ax.jp + 10*ax.sn + 6*ax.ei, 0, 100),
        control: clamp(50 + 20*ax.jp + 6*ax.tf - 4*ax.ei, 0, 100),
        patience: clamp(50 + 18*ax.jp - 10*ax.ei + 4*ax.tf, 0, 100),
      };
    }

    function roundScore(s){
      // 所有展示数字统一用整数
      return {
        pace: Math.round(s.pace),
        complex: Math.round(s.complex),
        risk: Math.round(s.risk),
        control: Math.round(s.control),
        patience: Math.round(s.patience),
      };
    }

    // 题目映射到画像的“可达范围”（由 scoreFromAxes 的系数推导）
    // 目的：避免某些卡组向量落在“根本不可达”的区域导致命中=0
    const REACH = {
      pace: [14, 86],
      complex: [20, 80],
      risk: [18, 82],
      control: [20, 80],
      patience: [18, 82],
    };

    function clampDeckVecs(){
      for (const deck of decks){
        for (const k of Object.keys(REACH)){
          const [lo, hi] = REACH[k];
          deck.vec[k] = clamp(deck.vec[k], lo, hi);
        }
      }
    }

    function renderKpis(){ /* 已移除实时面板：保留空实现避免改动过大 */ }

    function start(){

    function next(){

    function dist2(a, b){
      // 距离平方（用于比较，不用开方更快）
      let s = 0;
      for (const d of dims){
        const w = (d.key === "pace" || d.key === "control") ? 1.15 : 1.0;
        const diff = (a[d.key] - b[d.key]);
        s += w * diff * diff;
      }
      return s;
    }

    // ---- 均衡：让各卡组出现更平均（基于随机答题模拟做校准）----
    // 注意：这是确定性结果（同一套答案→同一卡组），做的是“决策边界”的偏置校准。
    let deckBias = null; // Array<number>，与 decks 顺序一致
    // 目标分布：尽量接近均匀（每套卡组概率相近）
    // 偏置的放大系数：否则 bias 数值太小，难以改变“谁胜出”的结果边界
    const BIAS_SCALE = 1000;

    // 固定随机种子：保证“均衡校准”结果稳定（不影响答题结果本身，答题仍是确定性）
    function mulberry32(seed){
      return function(){
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
    const CALIB_RAND = mulberry32(20260604);
    function randomInt(n){ return Math.floor(CALIB_RAND() * n); }

    function simulateScoreOnce(){
      const tmpAnswers = [];
      for (let i=0;i<questions.length;i++){
        tmpAnswers.push(randomInt(questions[i].opts.length)); // 三选：0/1/2
      }
      // 复用 axesFromAnswers 逻辑：临时替换 answers
      const old = answers;
      answers = tmpAnswers;
      const ax = axesFromAnswers();
      const sc = scoreFromAxes(ax);
      answers = old;
      return sc;
    }

    function bestDeckIndexForScore(sc, bias){
      let bestI = 0;
      let bestV = -Infinity;
      for (let i=0;i<decks.length;i++){
        const v = -(dist2(sc, decks[i].vec)) + (bias ? (bias[i] * BIAS_SCALE) : 0);
        if (v > bestV){ bestV = v; bestI = i; }
      }
      return bestI;
    }

    function buildTargetProbs(){
      const n = decks.length;
      return Array(n).fill(1 / n);
    }

    function calibrateDeckBias(){
      const n = decks.length;
      let bias = Array(n).fill(0);
      const target = buildTargetProbs();
      const iters = 34;
      const samples = 3200; // 更稳一点，压低“霸榜”卡组
      const lr = 1.0;

      for (let it=0; it<iters; it++){
        const cnt = Array(n).fill(0);
        for (let s=0; s<samples; s++){
          const sc = simulateScoreOnce();
          const bi = bestDeckIndexForScore(sc, bias);
          cnt[bi] += 1;
        }
        for (let i=0;i<n;i++){
          const p = cnt[i] / samples;
          bias[i] += lr * (target[i] - p);
        }
        // 消漂移：保持 bias 平均值为 0，避免整体平移
        const mean = bias.reduce((a,b)=>a+b, 0) / n;
        for (let i=0;i<n;i++) bias[i] -= mean;
      }
      return bias;
    }

    function finish(){
      bar.style.width = "100%";
      qnum.textContent = "完成";
      quiz.classList.add("hidden");
      result.classList.remove("hidden");
      idx = questions.length;

      const ranked = decks

          deck,
          v: -(dist2(score, deck.vec)) + (deckBias ? (deckBias[i] * BIAS_SCALE) : 0),
          d2: dist2(score, deck.vec),
        }))
        .sort((x,y) => y.v - x.v);

      const best = ranked[0].deck;
      const top3 = ranked.slice(0,3).map(x => x.deck);

    }

    // ---- 分享图生成（canvas）----
    let lastResult = null;

    async function loadImageForCanvas(url){
      // 微信内置浏览器/部分 iOS 对 createImageBitmap 支持不稳定：这里做多级兜底
      // 返回可直接 ctx.drawImage 的对象：ImageBitmap 或 HTMLImageElement
      // 1) fetch -> blob -> createImageBitmap（优先）
      // 2) fetch -> blob -> <img> 解码（兜底）
      // 3) 直接 <img src=url>（最后兜底）
      const canCreateBitmap = typeof createImageBitmap === "function";
      try{
        const res = await fetch(url, { cache: "force-cache" });
        if (!res.ok) throw new Error("fetch failed");
        const blob = await res.blob();
        if (canCreateBitmap){
          try{
            return await createImageBitmap(blob);
          }catch(e){
            // fallthrough
          }
        }
        // img from blob
        const blobUrl = URL.createObjectURL(blob);
        try{
          const img = new Image();
          img.decoding = "async";
          img.src = blobUrl;
          // decode() 在某些环境更稳；不支持则走 onload
          if (img.decode){
            await img.decode();
          }else{
            await new Promise((resolve, reject) => {
              img.onload = () => resolve();
              img.onerror = () => reject(new Error("img load failed"));
            });
          }
          return img;
        }finally{
          // 注意：img 可能还在使用 blobUrl，但现代浏览器会缓存解码后的数据；
          // 为稳妥起见，延迟一点再 revoke
          setTimeout(() => URL.revokeObjectURL(blobUrl), 2000);
        }
      }catch(e){
        try{
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.decoding = "async";
          img.src = url;
          if (img.decode){
            await img.decode();
          }else{
            await new Promise((resolve, reject) => {
              img.onload = () => resolve();
              img.onerror = () => reject(new Error("img load failed"));
            });
          }
          return img;
        }catch(e2){
          return null;
        }
      }
    }

    function roundRect(ctx, x, y, w, h, r){
      const rr = Math.min(r, w/2, h/2);
      ctx.beginPath();
      ctx.moveTo(x+rr, y);
      ctx.arcTo(x+w, y, x+w, y+h, rr);
      ctx.arcTo(x+w, y+h, x, y+h, rr);
      ctx.arcTo(x, y+h, x, y, rr);
      ctx.arcTo(x, y, x+w, y, rr);
      ctx.closePath();
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines){
      const words = text.split("");
      let line = "";
      let lines = 0;
      for (let i=0;i<words.length;i++){
        const test = line + words[i];
        if (ctx.measureText(test).width > maxWidth && line){
          ctx.fillText(line, x, y);
          y += lineHeight;
          line = words[i];
          lines++;
          if (lines >= (maxLines-1)) break;
        }else{
          line = test;
        }
      }
      if (line && lines < maxLines){
        ctx.fillText(line, x, y);
      }
    }

    async function generateShareImage(){

      g2.addColorStop(1, "rgba(37,99,235,0)");
      ctx.fillStyle = g2;
      ctx.fillRect(0,0,W,H);
      const g3 = ctx.createRadialGradient(W*0.86, H*0.22, 10, W*0.86, H*0.22, 520);
      g3.addColorStop(0, "rgba(6,182,212,0.14)");

      ctx.stroke();

      // 宝可梦头像（可选）

      if (bmp){

        ctx.fillStyle = "rgba(37,99,235,0.06)";

        ctx.fill();
        ctx.drawImage(bmp, 110, 280, 140, 140);
      }else{
        // 兜底：不画头像也能正常生成
      }

      // 卡组名
      ctx.fillStyle = "#0f172a";

      ctx.fillText(deck.cn, 300, 325);
      ctx.fillStyle = "#64748b";
      ctx.font = "400 30px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial";
      ctx.fillText(deck.en, 300, 375);

      // 标签
      const tags = deck.tags.slice(0,3);
      let tx = 300, ty = 410;
      ctx.font = "500 26px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial";
      for (const t of tags){
        const padX = 18, padY = 10;
        const w = ctx.measureText(t).width + padX*2;

        ctx.strokeStyle = "rgba(219,227,255,1)";
        roundRect(ctx, tx, ty-28, w, 44, 22);
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#475569";
        ctx.fillText(t, tx+padX, ty+2);
        tx += w + 12;
      }

      // 理由（取 deck.reason + 画像一句）
      ctx.fillStyle = "#0f172a";
      ctx.font = "700 32px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial";
      ctx.fillText("为什么适合你", 90, 500);
      ctx.fillStyle = "#334155";
      ctx.font = "400 30px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial";
      const whyText = deck.reason;
      wrapText(ctx, whyText, 90, 550, 900, 42, 4);

      // 你的画像（用当前 score）
      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.strokeStyle = "rgba(219,227,255,1)";
      roundRect(ctx, 60, 780, 960, 360, 34);
      ctx.fill(); ctx.stroke();

      ctx.fillStyle = "#64748b";
      ctx.font = "600 30px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial";
      ctx.fillText("你的训练家风格（0-100）", 90, 845);

      ctx.fillStyle = "#0f172a";
      ctx.font = "500 30px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial";
      const sp = {
        pace: Math.round(score.pace),
        complex: Math.round(score.complex),
        risk: Math.round(score.risk),
        control: Math.round(score.control),
        patience: Math.round(score.patience),
      };
      const lines = [
        `出手速度  ${sp.pace}`,
        `线路感  ${sp.complex}`,
        `搏命值  ${sp.risk}`,
        `控场欲  ${sp.control}`,
        `续航力  ${sp.patience}`,
      ];
      let yy = 905;
      for (const l of lines){
        ctx.fillText(l, 90, yy);
        yy += 52;
      }

      // 署名
      ctx.fillStyle = "#64748b";
      ctx.font = "400 28px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial";
      ctx.fillText("by 牛油果", 90, 1240);
      ctx.fillText("数据：Limitless（BRS–SSP）", 90, 1290);

      shareDataUrl = canvas.toDataURL("image/png");
      // 生成 blob url：更适合在微信里“点开大图/长按保存”
      try{
        if (shareBlobUrl) URL.revokeObjectURL(shareBlobUrl);
        const blob = dataUrlToBlob(shareDataUrl);
        shareBlobUrl = URL.createObjectURL(blob);
      }catch(e){
        shareBlobUrl = null;
      }
      $("sharePreview").src = shareDataUrl;
      $("sharePreviewWrap").classList.remove("hidden");
    }

    function dataUrlToBlob(dataUrl){
      const parts = dataUrl.split(",");
      const mime = parts[0].match(/:(.*?);/)[1];
      const bstr = atob(parts[1]);
      let n = bstr.length;
      const u8 = new Uint8Array(n);
      while(n--) u8[n] = bstr.charCodeAt(n);
      return new Blob([u8], { type: mime });
    }

    function openShareModal(){
      const url = shareBlobUrl || shareDataUrl;
      if (!url) return;
      shareModalImg.src = url;
      shareModal.classList.add("show");
    }

    function closeShareModal(){
      shareModal.classList.remove("show");
    }

    function renderDeck(deck, isBest){
      const url = `https://limitlesstcg.com/decks/${deck.id}`;
      const tags = deck.tags.map(t => `<span class="tag">${t}</span>`).join("");
      // 使用本地静态资源：微信内打开/分享图生成更稳定
      const iconUrl = `./assets/pokemon_icons/${deck.icon}.png`;

      const why = buildWhy(deck);
      return `
        <div class="deckhero">
          <img class="deckimg ${isBest ? "" : "small"}" src="${iconUrl}" alt="${deck.en}" loading="lazy" />
          <div>
            <div class="deckname">
              <div class="cn">${isBest ? "✅ " : ""}${deck.cn}</div>
              <div class="en">(${deck.en})</div>
            </div>
            <div class="small" style="margin-top:6px">${tags}</div>
            <div class="small" style="margin-top:8px">
              Limitless 链接：<a href="${url}" target="_blank" rel="noreferrer">${url}</a>
            </div>
          </div>
        </div>
        <div style="margin-top:10px;font-weight:700">为什么适合你</div>
        <ul class="why">${why}</ul>
        <div class="small" style="margin-top:10px">
          训练家风格：出手速度 ${deck.vec.pace} / 线路感 ${deck.vec.complex} / 搏命值 ${deck.vec.risk} / 控场欲 ${deck.vec.control} / 续航力 ${deck.vec.patience}
        </div>
      `;
    }

    function buildWhy(deck){
      // 用“你”的分数对齐 deck 的特点，给出自然语言理由（原型：规则可改）
      const lines = [];
      const s = score;
      if (deck.vec.pace >= 70){
        lines.push(s.pace >= 55
          ? "你出手很快，喜欢把节奏握在自己手里；这套更能把你的“神速”打成优势。"
          : "你不一定特别急，但这套能帮你更主动，减少被动挨打。");
      } else if (deck.vec.pace <= 35){
        lines.push(s.patience >= 60
          ? "你续航力强，能打耐久战；这套偏慢速/控场，越往后越能体现你的运营。"
          : "这套偏慢，更适合稳稳控住局面而不是拼速度。");
      } else {
        lines.push("你更像均衡型：既想推进也不想莽；这套能让你在不同对局里更灵活地换策略。");
      }

      if (deck.vec.complex >= 80){
        lines.push(s.complex >= 60
          ? "你线路感很强，喜欢多分支选择；它的路线/取舍多，很吃操作与对局理解。"
          : "它的路线较多：即使你不追求极致复杂，也能慢慢练出上限。");
      } else if (deck.vec.complex <= 40){
        lines.push("它的核心思路直观，决策负担低，更容易把注意力放在“推进与执行”上。");
      } else {
        lines.push("复杂度适中：有思考空间但不至于一直爆脑，适合长期上手。");
      }

      if (deck.vec.control >= 75){
        lines.push(s.control >= 55
          ? "你控场欲很强，喜欢把局面握在手里；这套的核心就是限制与拆解对手推进。"
          : "这套偏控：即使你不是典型控场玩家，也能把对手关键节点按住。");
      } else if (deck.vec.control <= 30){
        lines.push("它更偏正面推进与压制：用持续压力迫使对手跟着你的节奏走。");
      } else {
        lines.push("它兼顾对抗与推进：既能打正面也能适度干扰，对局面覆盖更广。");
      }

      // 风险偏好补一句
      if (deck.vec.risk >= 70){
        lines.push("它的上限高但更吃关键时机的取舍；你越敢抓窗口，上限就越容易被你打出来。");
      } else if (deck.vec.risk <= 40){
        lines.push("它偏稳健容错：不太依赖“搏命一把”，更适合稳扎稳打。");
      } else {
        lines.push("波动与稳定相对平衡：既有爆发点，也能通过运营把胜率托住。");
      }

      // 加上 deck 自带一句“定位总结”
      lines.push(deck.reason);
      return lines.map(x => `<li>${x}</li>`).join("");
    }

    // --- events ---
    btnStart.addEventListener("click", start);
    btnBack.addEventListener("click", () => { back(); });
    btnReset.addEventListener("click", reset);
    btnRetake.addEventListener("click", start);

    $("btnMakeShare").addEventListener("click", async () => {
      $("btnMakeShare").disabled = true;
      $("btnMakeShare").textContent = "生成中…";
      try{
        await generateShareImage();
      }finally{
        $("btnMakeShare").disabled = false;
        $("btnMakeShare").textContent = "重新生成";
      }
    });

    $("btnOpenShare").addEventListener("click", () => {
      // 改成弹层展示：微信内最稳（长按保存/转发）
      // 若还没生成，则点击时现生成再打开
      (async () => {
        if (!shareDataUrl){
          $("btnOpenShare").disabled = true;
          const old = $("btnOpenShare").textContent;
          $("btnOpenShare").textContent = "生成中…";
          try{
            await generateShareImage();
          }finally{
            $("btnOpenShare").disabled = false;
            $("btnOpenShare").textContent = old;
          }
        }
        openShareModal();
      })();
    });

    // 结果页顶部的“保存图片”= 同一个动作
    $("btnSaveTop").addEventListener("click", () => {
      $("btnOpenShare").click();
    });

    shareModal && shareModal.addEventListener("click", (e) => {
      if (e.target === shareModal) closeShareModal();
    });
    shareModalImg && shareModalImg.addEventListener("click", closeShareModal);

    // init
    clampDeckVecs();
    renderKpis();
    btnBack.disabled = true;
    // 预先做一次均衡校准（同步执行，控制在可接受耗时）
    deckBias = calibrateDeckBias();
  </script>
</body>
</html>
